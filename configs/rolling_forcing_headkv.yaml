use_headkv: true
use_adaptive_headkv: true
headkv_policy_csv_path: configs/head_configs/classification_results.csv
headkv_config_path: configs/head_configs/classification_results.csv

# Cache budget (aligned with pyramid-forcing)
headkv_default_capacity: 32760
headkv_frame_seq_length: 1560
headkv_dynamic_capacity: 31200
headkv_sink_tokens: 4680
headkv_code_map:
  "-1": 32760
  "1": 32760
  "2": 32760

headkv_capture_frame_id_mode: mapped
headkv_readout_cache_enabled: true
headkv_prompt_v_cache_enabled: false
decoupled_sink_tokens: 0
sink_grid_decoupling: true

headkv_dynamic_rope_mode: window_clamp
sink_time_clamp_min: 18
sink_time_clamp_max: 21
decoupled_sink_time_lag: 0
history_time_mapping_mode: none
history_relative_t_max: 21
history_time_soft_factor: 1.0

# Cyclic (oscillating heads)
cyclic_enabled: true
cyclic_period: 6
cyclic_bucket_cap: 3
cyclic_osc_only: true
cyclic_dynamic_rope: true

# Stride (stable heads label 1)
stride_enabled: true
stride_interval: 6
stride_capacity: 4
stride_dynamic_rope: true

# Merge (stable heads label 2)
merge_enabled: true
merge_patch_size: 2
merge_capacity: 6
merge_dynamic_rope: true

# Lag
lag_enabled: false
headkv_lag_offsets: []
headkv_lag_history: 21
lag_dynamic_rope: false

# Per-label sink/recent frames
headkv_osc_sink_frames: 1
headkv_stable_sink_frames: 3
headkv_stable_recent_frames: 4
headkv_stable_policy_enabled: true
headkv_label_sink_frames_map: {"-1": 1, "1": 3, "2": 3}
headkv_label_recent_frames_map: {"-1": 4, "1": 4, "2": 4}

# Per-label strategy maps
headkv_label_phase_bucket_map:
  "-1": 3
  "1": 0
  "2": 0
headkv_label_stride_enabled_map:
  "1": true
  "2": false
headkv_label_stride_interval_map:
  "1": 6
headkv_label_merge_enabled_map:
  "-1": false
  "1": false
  "2": true
headkv_label_merge_patch_size_map:
  "2": 2
headkv_label_merge_capacity_map:
  "2": 6

# Misc
update_interval: 1
semantic_seed_ratio: 0.01
headkv_disable_osc_sink: false
